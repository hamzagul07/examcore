name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: GEO lint (quick answer + llms sync)
        run: pnpm seo:quick-answer-lint && pnpm seo:geo-sync-check

      - name: Verify changed course lessons
        run: pnpm course:verify-changed -- --base origin/main

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          ANTHROPIC_API_KEY: sk-ant-placeholder
          GEMINI_API_KEY: placeholder

      - name: SEO regression (SSR + sitemap)
        run: |
          pnpm start --port 3099 &
          SERVER_PID=$!
          trap "kill $SERVER_PID 2>/dev/null || true" EXIT
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3099/robots.txt >/dev/null; then
              echo "Server ready"
              break
            fi
            sleep 2
          done
          curl -sf http://127.0.0.1:3099/robots.txt >/dev/null
          BASE_URL=http://127.0.0.1:3099 node scripts/seo-ssr-check.mjs
          SEO_SCAN_CONCURRENCY=12 SEO_SCAN_SKIP_PREFIXES=/community/,/dashboard/,/teacher/,/admin/,/account/ BASE_URL=http://127.0.0.1:3099 node scripts/seo-sitemap-scan.mjs
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          SUPABASE_SERVICE_ROLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
          ANTHROPIC_API_KEY: sk-ant-placeholder
          GEMINI_API_KEY: placeholder
