name: Refresh FX prices

# Re-syncs Stripe prices + pricing_config at live exchange rates so localized
# (non-USD) prices stay current. Stripe prices are immutable, so this runs on a
# schedule rather than per-request. USD prices come from lib/billing/pricing-usd.ts
# and don't change here — only the FX conversion for other currencies refreshes.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   STRIPE_SECRET_KEY, NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: refresh-fx-prices
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Sync Stripe prices at live FX
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: pnpm run setup-stripe-products
