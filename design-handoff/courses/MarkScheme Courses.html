<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MarkScheme — Courses · The Open Textbook, Marked Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme.css" />
<link rel="stylesheet" href="courses.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="course-data.jsx"></script>
<script type="text/babel" src="lessons-9702.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="diagram.jsx"></script>
<script type="text/babel" src="page-catalog.jsx"></script>
<script type="text/babel" src="page-hub.jsx"></script>
<script type="text/babel" src="page-lesson.jsx"></script>
<script type="text/babel" src="page-subjects.jsx"></script>
<script type="text/babel" src="page-dashboard.jsx"></script>
<script type="text/babel" src="page-pricing.jsx"></script>
<script type="text/babel">
const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "paper",
  "ink": "examiner green",
  "annotations": true,
  "density": "cozy",
  "simplerDefault": false
}/*EDITMODE-END*/;

const INK_MAP = {
  'examiner green': { paper: '#1e8a5e', night: '#00f5a0' },
  'teal marker':    { paper: '#1f8a8a', night: '#2dd4bf' },
  'blue biro':      { paper: '#3a5fb8', night: '#7aa2ff' },
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [route, setRoute] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('msc-route')) || { page: 'catalog' }; }
    catch (e) { return { page: 'catalog' }; }
  });
  const page = route.page;

  const go = (p, opts = {}) => {
    const next = { page: p, subject: opts.subject || route.subject || '9702', topic: opts.topic || null };
    setRoute(next);
    localStorage.setItem('msc-route', JSON.stringify(next));
    window.scrollTo({ top: 0 });
  };

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', t.theme);
  }, [t.theme]);

  const ink = (INK_MAP[t.ink] || INK_MAP['examiner green'])[t.theme === 'night' ? 'night' : 'paper'];
  const inkVars = {
    '--ink': ink, '--ink-bright': ink,
    '--ink-soft': `color-mix(in srgb, ${ink} 11%, transparent)`,
    '--ink-border': `color-mix(in srgb, ${ink} 38%, transparent)`,
    '--cta-shadow': `0 10px 24px color-mix(in srgb, ${ink} 25%, transparent)`,
    fontSize: t.density === 'compact' ? '15px' : '16px',
  };

  const Page = { catalog: CatalogPage, hub: HubPage, lesson: LessonPage, subjects: SubjectsPage, progress: DashboardPage, pricing: PricingPage }[page] || CatalogPage;

  return (
    <div className={(t.annotations ? '' : 'no-annot') + (t.density === 'compact' ? ' dense' : '')} style={inkVars}>
      <Nav page={page} go={go} theme={t.theme}
        onFlipTheme={() => setTweak('theme', t.theme === 'paper' ? 'night' : 'paper')}
        onSearch={() => {}} />
      <Page key={page + (route.subject||'') + (route.topic||'')} go={go} subject={route.subject || '9702'} topic={route.topic} simplerDefault={t.simplerDefault} />
      <Footer go={go} />
      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={t.theme} options={['paper', 'night']} onChange={(v) => setTweak('theme', v)} />
        <TweakRadio label="Ink" value={t.ink} options={['examiner green', 'teal marker', 'blue biro']} onChange={(v) => setTweak('ink', v)} />
        <TweakSection label="Reading" />
        <TweakRadio label="Density" value={t.density} options={['cozy', 'compact']} onChange={(v) => setTweak('density', v)} />
        <TweakToggle label="Hand annotations" value={t.annotations} onChange={(v) => setTweak('annotations', v)} />
        <TweakToggle label="Explain-simpler by default" value={t.simplerDefault} onChange={(v) => setTweak('simplerDefault', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
