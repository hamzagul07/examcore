<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MarkScheme — Prototype · Margin Notes direction</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="theme.css" />
<link rel="stylesheet" href="pages.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="command-bar.jsx"></script>
<script type="text/babel" src="page-landing.jsx"></script>
<script type="text/babel" src="page-mark.jsx"></script>
<script type="text/babel" src="page-subjects.jsx"></script>
<script type="text/babel" src="page-subject-detail.jsx"></script>
<script type="text/babel" src="page-onboarding.jsx"></script>
<script type="text/babel" src="page-content.jsx"></script>
<script type="text/babel" src="page-account.jsx"></script>
<script type="text/babel" src="page-story.jsx"></script>
<script type="text/babel" src="page-courses.jsx"></script>
<script type="text/babel" src="page-misc.jsx"></script>
<script type="text/babel" src="omni.jsx"></script>
<script type="text/babel">
const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakToggle } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "paper",
  "ink": "examiner green",
  "annotations": true
}/*EDITMODE-END*/;

const INK_MAP = {
  'examiner green': { paper: '#1e8a5e', night: '#00f5a0' },
  'teal marker':    { paper: '#1f8a8a', night: '#2dd4bf' },
  'blue biro':      { paper: '#3a5fb8', night: '#7aa2ff' },
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [cmdOpen, setCmdOpen] = React.useState(false);
  const [route, setRoute] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('ms-route')) || { page: 'landing', param: null }; }
    catch (e) { return { page: 'landing', param: null }; }
  });
  const page = route.page;

  const go = (p, param = null) => {
    setRoute({ page: p, param });
    localStorage.setItem('ms-route', JSON.stringify({ page: p, param }));
    window.scrollTo({ top: 0 });
  };

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', t.theme);
  }, [t.theme]);

  const ink = (INK_MAP[t.ink] || INK_MAP['examiner green'])[t.theme === 'night' ? 'night' : 'paper'];
  const inkVars = {
    '--ink': ink,
    '--ink-bright': ink,
    '--ink-soft': `color-mix(in srgb, ${ink} 11%, transparent)`,
    '--ink-border': `color-mix(in srgb, ${ink} 38%, transparent)`,
    '--cta-shadow': `0 10px 24px color-mix(in srgb, ${ink} 25%, transparent)`,
  };

  const Page = { landing: LandingPage, mark: MarkPage, subjects: SubjectsPage, subject: SubjectDetailPage, onboarding: OnboardingPage, how: HowItWorksPage, guides: GuidesPage, account: AccountPage, story: StoryPage, courses: CoursesPage, dashboard: DashboardPage, pricing: PricingPage }[page] || LandingPage;

  return (
    <div className={t.annotations ? '' : 'no-annot'} style={inkVars}>
      <Nav
        page={page}
        go={go}
        theme={t.theme}
        onFlipTheme={() => setTweak('theme', t.theme === 'paper' ? 'night' : 'paper')}
        onSearch={() => setCmdOpen(true)}
      />
      <CommandBar go={go} open={cmdOpen} setOpen={setCmdOpen} />
      <Page key={page + (route.param || '')} go={go} param={route.param} />
      <Footer go={go} />
      <TabBar page={page} go={go} />
      <OmniWidget go={go} />
      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio label="Mode" value={t.theme} options={['paper', 'night']} onChange={(v) => setTweak('theme', v)} />
        <TweakRadio label="Ink" value={t.ink} options={['examiner green', 'teal marker', 'blue biro']} onChange={(v) => setTweak('ink', v)} />
        <TweakSection label="Personality" />
        <TweakToggle label="Hand annotations" value={t.annotations} onChange={(v) => setTweak('annotations', v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
